name: Build Pansou
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.20'
          cache: false  # 关键：禁用缓存，解决 tar 报错
      - name: Build
        run: |
          go mod tidy
          GOOS=linux GOARCH=amd64 go build -v -o pansou main.go
      - uses: actions/upload-artifact@v4
        with:
          name: pansou-linux
          path: pansou

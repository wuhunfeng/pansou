name: Build Pansou
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.20' # 锁定版本为 1.20，避免sonic库的编译错误
      - run: go mod tidy
      - run: GOOS=linux GOARCH=amd64 go build -o pansou main.go
      - uses: actions/upload-artifact@v4
        with:
          name: pansou-linux
          path: pansou

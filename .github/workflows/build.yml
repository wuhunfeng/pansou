name: Build Pansou
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        run: GOOS=linux GOARCH=amd64 go build -v -o pansou main.go
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pansou-linux
          path: pansou
